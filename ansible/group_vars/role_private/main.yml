# ansible_ssh_common_args: >-
#   -o ProxyJump=ubuntu@{{ hostvars[groups['role_bastion'][0]].public_ip_address }}


ansible_host: "{{ private_ip_address }}"
ansible_user: ubuntu
ansible_ssh_private_key_file: ~/.ssh/AWS.pem
ansible_ssh_common_args: >-
  -o ProxyCommand="ssh -i ~/.ssh/AWS.pem -W %h:%p admin@{{ hostvars[groups['role_bastion'][0]].public_ip_address }}"
  -o StrictHostKeyChecking=accept-new
